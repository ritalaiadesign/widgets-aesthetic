<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <title>Relógio · ritalaia.design</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: 'Inter', sans-serif;
      color: #333;
    }
    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .rl-clock {
      width: 190px;
      height: 190px;
      border-radius: 26px;
      background: #f6f5f3;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(51, 51, 51, 0.05);
    }
    .rl-clock-svg {
      width: 168px;
      height: 168px;
    }
    /* minute ticks — thin grey */
    .tick-min {
      stroke: #c9c5bd;
      stroke-width: 1;
      stroke-linecap: round;
    }
    /* hour ticks — bold dark */
    .tick-hour {
      stroke: #333333;
      stroke-width: 2.4;
      stroke-linecap: round;
    }
    .hand {
      stroke-linecap: round;
    }
    .hand-hour {
      stroke: #333333;
      stroke-width: 4.5;
    }
    .hand-min {
      stroke: #333333;
      stroke-width: 3.2;
    }
    .hand-sec {
      stroke: #ca88fb;
      stroke-width: 1.6;
    }
    .center-outer { fill: #dffb76; stroke: #333; stroke-width: 2; }
  </style>
</head>
<body>
  <div class="rl-clock">
    <svg class="rl-clock-svg" viewBox="0 0 168 168">
      <g id="ticks"></g>

      <line class="hand hand-hour" x1="84" y1="84" x2="84" y2="46"></line>
      <line class="hand hand-min"  x1="84" y1="84" x2="84" y2="28"></line>
      <line class="hand hand-sec"  x1="84" y1="90" x2="84" y2="22"></line>

      <circle class="center-outer" cx="84" cy="84" r="4"></circle>
    </svg>
  </div>

  <script>
    // Build 60 ticks: 12 bold hour ticks + 48 thin minute ticks
    (function () {
      var g = document.getElementById('ticks');
      var cx = 84, cy = 84;
      var rOuter = 76;
      for (var i = 0; i < 60; i++) {
        var isHour = (i % 5 === 0);
        var len = isHour ? 9 : 5;
        var rInner = rOuter - len;
        var angle = (i * 6 - 90) * Math.PI / 180;
        var x1 = cx + rOuter * Math.cos(angle);
        var y1 = cy + rOuter * Math.sin(angle);
        var x2 = cx + rInner * Math.cos(angle);
        var y2 = cy + rInner * Math.sin(angle);
        var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('class', isHour ? 'tick-hour' : 'tick-min');
        g.appendChild(line);
      }

      var hourEl = document.querySelector('.hand-hour');
      var minEl  = document.querySelector('.hand-min');
      var secEl  = document.querySelector('.hand-sec');

      function tick() {
        var now = new Date();
        var h = now.getHours();
        var m = now.getMinutes();
        var s = now.getSeconds() + now.getMilliseconds() / 1000;

        var hourDeg = (h % 12) * 30 + m * 0.5;
        var minDeg  = m * 6 + s * 0.1;
        var secDeg  = s * 6;

        hourEl.setAttribute('transform', 'rotate(' + hourDeg + ' 84 84)');
        minEl.setAttribute('transform',  'rotate(' + minDeg  + ' 84 84)');
        secEl.setAttribute('transform',  'rotate(' + secDeg  + ' 84 84)');
      }

      tick();
      setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
